<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitcoinDobmoney | Solana</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
:root {
    --bg: #050508;
    --surface: #0d0d14;
    --surface2: #13131e;
    --border: rgba(130,100,255,0.18);
    --accent: #7c3aed;
    --accent2: #06d6a0;
    --accent3: #f59e0b;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --danger: #ef4444;
    --success: #10b981;
    --glow: 0 0 30px rgba(124,58,237,0.35);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

/* 🌍 Selector de idiomas */
.selector-idiomas {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 30px;
}

.btn-idioma {
    background-color: var(--surface);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 12px 28px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
    font-size: 18px;
    transition: all 0.3s ease;
}

.btn-idioma.activo {
    background-color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
}

.btn-idioma:hover {
    transform: translateY(-3px);
}

/* Estilos de las tarjetas SIN PRECIOS */
.grilla-precios {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 24px 0;
}

.tarjeta-precio {
    background-color: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    transition: all 0.3s ease;
}

.tarjeta-precio:hover {
    border-color: var(--accent);
    box-shadow: 0 0 25px rgba(124, 58, 237, 0.25);
    transform: translateY(-4px);
}

.icono-precio {
    font-size: 50px;
    margin-bottom: 15px;
}

.nombre-precio {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 0;
}

.etiqueta-moneda {
    font-size: 14px;
    color: var(--muted);
    margin-top: 8px;
}

/* Sección de otras monedas */
.tarjeta-otras {
    grid-column: span 2;
    background-color: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    margin: 24px 0;
    transition: all 0.3s ease;
}

.tarjeta-otras:hover {
    border-color: var(--accent2);
    box-shadow: 0 0 25px rgba(6, 214, 160, 0.25);
    transform: translateY(-4px);
}

.titulo-otras {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent2);
    margin-bottom: 25px;
}

.grilla-monedas {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
}

.moneda-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: center;
}

.nombre-moneda {
    font-size: 18px;
    color: var(--muted);
    font-weight: 600;
}

/* Nombre del creador */
.nombre-creador {
    font-size: 18px;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 500;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<body>

<!-- 🌍 Selector de idiomas -->

</div>

<script>
// 📚 DICCIONARIO DE TRADUCCIONES
const traducciones = {
    es: {
        titulo_principal: "BitcoinDobmoney",
        descripcion_principal: "Criptomonedas y Activos Digitales",
        otras_monedas: "OTRAS MONEDAS"
    },
    en: {
        titulo_principal: "BitcoinDobmoney",
        descripcion_principal: "Cryptocurrencies & Digital Assets",
        otras_monedas: "OTHER COINS"
    },
    "en-us": {
        titulo_principal: "BitcoinDobmoney",
        descripcion_principal: "Crypto & Digital Assets",
        otras_monedas: "MORE COINS"
    }
};

// 🌍 FUNCIONAMIENTO DEL CAMBIO DE IDIOMA
document.querySelectorAll('.btn-idioma').forEach(boton => {
    boton.addEventListener('click', () => {
        // Quitar clase activa a todos los botones
        document.querySelectorAll('.btn-idioma').forEach(b => b.classList.remove('activo'));
        // Agregar clase activa al botón seleccionado
        boton.classList.add('activo');
        
        // Obtener el idioma elegido
        const idioma = boton.dataset.idioma;
        
        // Aplicar los cambios de texto
        aplicarTraducciones(idioma);
    });
});

// Función para cambiar todo el texto
function aplicarTraducciones(idioma) {
    const datos = traducciones[idioma];
    
    // Buscar todos los elementos que tienen el atributo data-tr
    document.querySelectorAll('[data-tr]').forEach(elemento => {
        const clave = elemento.dataset.tr;
        if (datos[clave]) {
            elemento.textContent = datos[clave];
        }
    });
}
</script>
