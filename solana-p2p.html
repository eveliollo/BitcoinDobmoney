<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexTrade P2P – Solana</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
:root {
    --bg: #050508;
    --surface: #0d0d14;
    --surface2: #13131e;
    --border: rgba(130,100,255,0.18);
    --accent: #7c3aed;
    --accent2: #06d6a0;
    --accent3: #f59e0b;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --danger: #ef4444;
    --success: #10b981;
    --glow: 0 0 30px rgba(124,58,237,0.35);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

/* 🌍 ESTILOS DE IDIOMAS */
.selector-idiomas {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-bottom: 20px;
}

.btn-idioma {
    background-color: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s ease;
}

.btn-idioma.activo {
    background-color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
}

.btn-idioma:hover {
    transform: translateY(-2px);
}

/* 👇 ESTILOS DE LA SECCIÓN DE PRECIOS */
.seccion-precios {
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin: 24px 0;
    box-shadow: var(--glow);
    animation: fadeInUp 0.8s ease;
}

.cabecera-precios {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
}

.titulo-precios {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
}

.actualizacion-precios {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
}

.etiqueta {
    background-color: var(--accent2);
    color: var(--bg);
    font-size: 11px;
    font-weight: 800;
    padding: 6px 16px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.grilla-precios {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
}

.tarjeta-precio {
    background-color: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.3s ease;
}

.tarjeta-precio:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
    transform: translateY(-3px);
}

.icono-precio {
    font-size: 32px;
    margin-bottom: 8px;
}

.nombre-precio {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
}

.valor-precio {
    font-size: 24px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 4px;
}

.etiqueta-moneda {
    font-size: 11px;
    color: var(--muted);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<!-- 🌍 SELECCIONADOR DE IDIOMAS -->
<div class="selector-idiomas">
    <button class="btn-idioma activo" data-idioma="es">Español</button>
    <button class="btn-idioma" data-idioma="en">English</button>
    <button class="btn-idioma" data-idioma="en-us">English US</button>
</div>

<!-- ENCABEZADO PRINCIPAL -->
<header style="text-align: center; margin-bottom: 20px;">
    <h1 style="font-size: 32px; font-weight: 900; color: var(--accent); margin-bottom: 8px;" data-tr="titulo_principal">NexTrade P2P</h1>
    <p style="color: var(--muted);" data-tr="descripcion_principal">Intercambio seguro de criptomonedas en Solana</p>
</header>

<!-- 👇 SECCIÓN DE PRECIOS EN TIEMPO REAL -->
<section class="seccion-precios">
    <div class="cabecera-precios">
        <div>
            <h2 class="titulo-precios" data-tr="titulo_precios">📈 Precios en tiempo real</h2>
            <p class="actualizacion-precios" id="tiempo-actualizacion" data-tr="actualizado">Actualizando...</p>
        </div>
        <span class="etiqueta" data-tr="etiqueta">Solana & Criptomonedas</span>
    </div>

    <div class="grilla-precios">
        <!-- BITCOIN -->
        <div class="tarjeta-precio">
            <div class="icono-precio" style="color: var(--accent3);">₿</div>
            <div class="nombre-precio" style="color: var(--accent3);">BITCOIN</div>
            <div class="valor-precio" id="precio-btc">Cargando...</div>
            <div class="etiqueta-moneda">USD</div>
        </div>

        <!-- ETHEREUM -->
        <div class="tarjeta-precio">
            <div class="icono-precio" style="color: #627EEA;">Ξ</div>
            <div class="nombre-precio" style="color: #627EEA;">ETHEREUM</div>
            <div class="valor-precio" id="precio-eth">Cargando...</div>
            <div class="etiqueta-moneda">USD</div>
        </div>

        <!-- SOLANA -->
        <div class="tarjeta-precio">
            <div class="icono-precio" style="color: var(--accent);">◎</div>
            <div class="nombre-precio" style="color: var(--accent);">SOLANA</div>
            <div class="valor-precio" id="precio-sol">Cargando...</div>
            <div class="etiqueta-moneda">USD</div>
        </div>

        <!-- OTRAS MONEDAS -->
        <div class="tarjeta-precio">
            <div class="icono-precio" style="color: var(--accent2);">💎</div>
            <div class="nombre-precio" style="color: var(--accent2);" data-tr="otras_monedas">OTRAS</div>
            <div style="margin-top: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span class="text-xs text-[var(--muted)]">DOGE</span>
                    <span class="text-sm font-bold" id="precio-doge">Cargando...</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span class="text-xs text-[var(--muted)]">ADA</span>
                    <span class="text-sm font-bold" id="precio-ada">Cargando...</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="text-xs text-[var(--muted)]">USDT</span>
                    <span class="text-sm font-bold" id="precio-usdt">Cargando...</span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- AQUÍ SIGUE EL RESTO DE TU CÓDIGO -->
<!-- Todo el contenido que tenías antes, tus tablas, botones, formularios, etc. -->

<script>
// 📚 DICCIONARIO DE TRADUCCIONES
const traducciones = {
    es: {
        titulo_principal: "NexTrade P2P",
        descripcion_principal: "Intercambio seguro de criptomonedas en Solana",
        titulo_precios: "📈 Precios en tiempo real",
        actualizado: "Actualizado: ",
        etiqueta: "Solana & Criptomonedas",
        otras_monedas: "OTRAS",
        cargando: "Cargando...",
        sin_conexion: "Sin conexión - Usando valores por defecto"
    },
    en: {
        titulo_principal: "NexTrade P2P",
        descripcion_principal: "Secure cryptocurrency exchange on Solana",
        titulo_precios: "📈 Real-time prices",
        actualizado: "Updated: ",
        etiqueta: "Solana & Cryptocurrencies",
        otras_monedas: "OTHERS",
        cargando: "Loading...",
        sin_conexion: "No connection - Using default values"
    },
    "en-us": {
        titulo_principal: "NexTrade P2P",
        descripcion_principal: "Safe crypto trading platform on Solana",
        titulo_precios: "📈 Live market prices",
        actualizado: "Last updated: ",
        etiqueta: "Solana & Digital Assets",
        otras_monedas: "MORE COINS",
        cargando: "Loading...",
        sin_conexion: "Offline - Using preset values"
    }
};

// 🌍 FUNCIONAMIENTO DEL SELECTOR DE IDIOMAS
document.querySelectorAll('.btn-idioma').forEach(boton => {
    boton.addEventListener('click', () => {
        // Quitar clase activa a todos
        document.querySelectorAll('.btn-idioma').forEach(b => b.classList.remove('activo'));
        // Agregar clase al seleccionado
        boton.classList.add('activo');
        
        // Obtener idioma
        const idioma = boton.dataset.idioma;
        
        // Cambiar atributo del HTML
        document.documentElement.lang = idioma;
        
        // Aplicar todas las traducciones
        aplicarTraducciones(idioma);
    });
});

function aplicarTraducciones(idioma) {
    const datos = traducciones[idioma];
    
    // Buscar todos los elementos con data-tr y cambiar su texto
    document.querySelectorAll('[data-tr]').forEach(elemento => {
        const clave = elemento.dataset.tr;
        if (datos[clave]) {
            elemento.textContent = datos[clave];
        }
    });
}

// Función para obtener precios en tiempo real
async function cargarPrecios() {
    try {
        // Llamada a la API de precios
        const respuesta = await fetch(
            "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,dogecoin,cardano,tether&vs_currencies=usd"
        );
        const datos = await respuesta.json();

        // Actualizar valores en la pantalla
        document.getElementById('precio-btc').textContent = '$' + datos.bitcoin.usd.toLocaleString('es-ES');
        document.getElementById('precio-eth').textContent = '$' + datos.ethereum.usd.toLocaleString('es-ES');
        document.getElementById('precio-sol').textContent = '$' + datos.solana.usd.toLocaleString('es-ES');
        document.getElementById('precio-doge').textContent = '$' + datos.dogecoin.usd.toFixed(5);
        document.getElementById('precio-ada').textContent = '$' + datos.cardano.usd.toFixed(4);
        document.getElementById('precio-usdt').textContent = '$' + datos.tether.usd.toFixed(4);

        // Mostrar fecha y hora de actualización
        const ahora = new Date();
        document.getElementById('tiempo-actualizacion').textContent = traducciones[document.documentElement.lang].actualizado + ahora.toLocaleTimeString('es-ES');

    } catch (error) {
        // Si hay error, mostrar valores por defecto
        document.getElementById('precio-btc').textContent = '$76.970';
        document.getElementById('precio-eth').textContent = '$2.130';
        document.getElementById('precio-sol').textContent = '$85,50';
        document.getElementById('precio-doge').textContent = '$0,098';
        document.getElementById('precio-ada').textContent = '$0,25';
        document.getElementById('precio-usdt').textContent = '$1,00';
        
        // Mostrar mensaje según el idioma
        document.getElementById('tiempo-actualizacion').textContent = traducciones[document.documentElement.lang].sin_conexion;
    }
}

// Cargar traducciones por defecto y precios al abrir la página
aplicarTraducciones('es');
cargarPrecios();

// Actualizar precios cada 30 segundos
setInterval(cargarPrecios, 30000);
</script>

</body>
</html>
