<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitcoinDobmoney P2P IA</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--gold:#F7B731;--dark:#0A0A0F;--dark2:#12121A;--dark3:#1A1A28;--border:rgba(247,183,49,0.15);--text:#E8E8F0;--muted:#6B6B8A;--green:#00E676;--red:#FF4757}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:sans-serif}
#login{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:100}
.box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:32px 24px;width:300px;text-align:center}
.box h1{font-size:20px;margin-bottom:4px}
.box h1 span{color:var(--gold)}
.box p{font-size:12px;color:var(--muted);margin-bottom:20px}
input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-size:15px;margin-bottom:12px}
.btn{width:100%;background:linear-gradient(135deg,var(--gold),#FF8C00);border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;color:#000;cursor:pointer}
#app{display:none;flex-direction:column;height:100vh}
.header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;background:var(--dark2);border-bottom:1px solid var(--border)}
.logo{font-weight:800;font-size:15px}
.logo span{color:var(--gold)}
.prices{display:flex;gap:10px;font-size:10px;text-align:center}
.pval{color:var(--gold);font-weight:700}
.tabs{display:flex;background:var(--dark2);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px 4px;font-size:11px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer}
.tab.on{color:var(--gold);border-bottom:2px solid var(--gold)}
.pg{display:none;overflow-y:auto;height:calc(100vh - 110px)}
.pg.on{display:block}
.chat-box{display:flex;flex-direction:column;height:calc(100vh - 110px)}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px}
.me{background:linear-gradient(135deg,var(--gold),#FF8C00);color:#000;align-self:flex-end}
.other{background:var(--dark3);align-self:flex-start}
.ia{background:#0d0d2e;border:1px solid rgba(100,100,255,0.3);align-self:flex-start}
.mu{font-size:10px;color:var(--muted);margin-bottom:3px}
.inp-row{padding:10px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--dark2)}
.inp-row input{margin:0;border-radius:12px;padding:12px}
.sbtn{background:var(--gold);border:none;border-radius:12px;width:44px;font-size:18px;cursor:pointer}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin:8px}
.uname{font-size:14px;font-weight:600}
.ustat{font-size:11px;color:var(--green)}
.cbtn{background:var(--green);border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;color:#000;cursor:pointer}
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.buy{background:rgba(0,230,118,0.2);color:var(--green)}
.sell{background:rgba(255,71,87,0.2);color:var(--red)}
.amt{font-size:16px;font-weight:700;color:var(--gold)}
.hint{text-align:center;font-size:10px;color:var(--muted);padding:6px}
#vmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;align-items:center;justify-content:center;flex-direction:column}
#vmodal.on{display:flex}
#rvid{width:90%;max-width:400px;border-radius:16px;background:#111;min-height:250px}
#lvid{position:absolute;bottom:80px;right:20px;width:90px;border-radius:10px;background:#222}
.vctrls{display:flex;gap:16px;margin-top:16px}
.vbtn{width:54px;height:54px;border-radius:50%;border:none;font-size:20px;cursor:pointer}
.vend{background:var(--red)}
.vmute{background:var(--dark3);border:1px solid var(--border)}
.cscreen{text-align:center;padding:30px}
.cname{font-size:22px;font-weight:800;margin-bottom:8px}
.cst{font-size:13px;color:var(--muted);margin-bottom:24px}
.ans{background:var(--green);color:#000;border:none;border-radius:30px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;margin-right:10px}
.dec{background:var(--red);color:#fff;border:none;border-radius:30px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;pointer-events:none;z-index:300}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.form-wrap{padding:12px}
.form-wrap h3{color:var(--gold);font-size:13px;margin-bottom:10px}
select{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;margin-bottom:8px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.pbtn{width:100%;background:linear-gradient(135deg,var(--gold),#FF8C00);border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;color:#000;cursor:pointer}
</style>
</head>

<div class="box">
<div style="font-size:44px">₿</div>
<h1>Bitcoin<span>Dobmoney</span></h1>
<p>P2P · IA · VIDEOLLAMADAS · EVELIO</p>
<input id="uinput" type="text" placeholder="Tu nombre de usuario">
<button class="btn" onclick="login()">ENTRAR →</button>
</div>
