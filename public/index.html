<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitcoinDobmoney</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 { color: #f7931a; font-size: 2rem; margin-bottom: 10px; }
    p { color: #aaa; font-size: 1rem; }
    .status {
      margin-top: 20px;
      padding: 10px 20px;
      background: #1c2330;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #2ecc71;
    }
  </style>
</head>
<body>
  <h1>₿ BitcoinDobmoney</h1>
  <p>Plataforma de trading P2P en línea</p>
  <div class="status">🟢 Servidor activo</div>

  <script>
    fetch('/api/status')
      .then(r => r.json())
      .then(data => {
        document.querySelector('.status').textContent =
          data.online ? '🟢 Servidor activo' : '🔴 Sin conexión';
      })
      .catch(() => {
        document.querySelector('.status').textContent = '🔴 Error de conexión';
      });
  </script>
</body>
</html>
