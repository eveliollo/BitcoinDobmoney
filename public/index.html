<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitcoinDobmoney</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #121a29 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { 
            color: #f7931a; 
            font-size: 2.5rem; 
            margin-bottom: 1rem;
            text-shadow: 0 0 15px rgba(247, 147, 26, 0.3);
        }
        p { 
            color: #b0b0b0; 
            font-size: 1.1rem; 
            margin-bottom: 2.5rem;
            text-align: center;
        }
        /* 👇 ESTILO MEJORADO DEL BOTÓN */
        .status {
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #165d37 0%, #218852 100%);
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(22, 93, 55, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(22, 93, 55, 0.6);
            background: linear-gradient(135deg, #1a7042 0%, #279a5d 100%);
        }
        .status:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(22, 93, 55, 0.4);
        }
        .status .icon {
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
    <h1>₿ BitcoinDobmoney</h1>
    <p>Plataforma de trading P2P en línea</p>
    
    <!-- 👇 BOTÓN MEJORADO -->
    <div class="status">
        <span class="icon">🟢</span>
        Servidor activo
    </div>

    <!-- Código de funcionamiento -->
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const boton = document.querySelector(".status");

        boton.addEventListener("click", function() {
            // Mensaje de bienvenida mejorado
            alert(`¡Bienvenido a BitcoinDobmoney! 🚀
            
Tu plataforma de trading P2P está lista y funcionando correctamente.
Puedes empezar a operar con seguridad y confianza.

¡Gracias por elegirnos! 💸`);

            // Si quieres que abra otra página, borra lo de arriba y usa esto:
            // window.location.href = "/dashboard.html";
        });
    });
    </script>

    <script>
    fetch('/api/status')
    .then(r => r.json())
    .then(d => console.log('Estado del servidor:', d))
    .catch(e => console.log('Error al cargar estado:', e));
    </script>
</body>
</html>
