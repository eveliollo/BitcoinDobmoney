<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BitcoinDobmoney | Solana</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --sol: #9945FF;
  --sol2: #14F195;
  --sol3: #00C2FF;
  --bg: #050510;
  --bg2: #0d0d22;
  --border: rgba(153,69,255,0.3);
  --border2: rgba(20,241,149,0.25);
  --text: #e8e8ff;
  --muted: #7070a0;
  --font-mono: 'Space Mono', monospace;
  --font-main: 'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(153,69,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(153,69,255,0.04) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  top: -100px; left: 50%; transform: translateX(-50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(153,69,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}

/* ── CARD ── */
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: rgba(13,13,34,0.85);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 28px;
  backdrop-filter: blur(24px);
  box-shadow: 0 0 60px rgba(153,69,255,0.1);
}

/* ── LOGO ── */
.logo-area { text-align: center; margin-bottom: 32px; }

.rocket { font-size: 3rem; display: block; margin-bottom: 12px;
  animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.logo { font-size: 1.6rem; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--sol), var(--sol2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.sub { font-size: 0.75rem; color: var(--muted); font-family: var(--font-mono);
  margin-top: 6px; letter-spacing: 0.5px; }

/* ── NETWORK BADGE ── */
.net-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(20,241,149,0.08);
  border: 1px solid var(--border2);
  border-radius: 20px; padding: 6px 14px;
  font-size: 0.7rem; font-family: var(--font-mono);
  color: var(--sol2); margin-bottom: 24px;
  width: 100%; justify-content: center;
}
.dot { width: 7px; height: 7px; border-radius: 50%;
  background: var(--sol2); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── CONNECT BUTTON ── */
.btn-connect {
  width: 100%;
  padding: 16px;
  border-radius: 14px; border: none; cursor: pointer;
  font-family: var(--font-main); font-weight: 800; font-size: 1rem;
  letter-spacing: .3px;
  background: linear-gradient(135deg, var(--sol), #7b2fff);
  color: #fff;
  box-shadow: 0 4px 24px rgba(153,69,255,0.45);
  transition: all .25s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-connect:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(153,69,255,0.6);
}
.btn-connect:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-connect.connected {
  background: linear-gradient(135deg, #0a8f5a, #14F195);
  box-shadow: 0 4px 24px rgba(20,241,149,0.35);
}

/* ── WALLET INFO BOX ── */
.wallet-box {
  display: none;
  margin-top: 20px;
  background: rgba(20,241,149,0.05);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 20px;
}
.wallet-box.show { display: block; animation: fadeIn .4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.wlabel {
  font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); font-family: var(--font-mono); margin-bottom: 6px;
}
.waddr {
  font-size: 0.78rem; font-family: var(--font-mono);
  color: var(--sol3); word-break: break-all;
  background: rgba(0,0,0,.3); border-radius: 8px;
  padding: 8px 10px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.copy-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 1rem; flex-shrink: 0;
}
.copy-btn:hover { color: var(--sol2); }

.bal-row {
  display: flex; align-items: baseline; gap: 8px;
}
.bal-num {
  font-size: 2rem; font-weight: 800;
  background: linear-gradient(90deg, var(--sol2), var(--sol3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  font-family: var(--font-mono);
}
.bal-unit { font-size: 0.85rem; color: var(--muted); font-family: var(--font-mono); }

.bal-usd {
  font-size: 0.75rem; color: var(--muted);
  font-family: var(--font-mono); margin-top: 4px;
}

/* ── AIRDROP ── */
.btn-airdrop {
  width: 100%; margin-top: 14px;
  padding: 10px; border-radius: 10px; border: none; cursor: pointer;
  background: rgba(0,194,255,0.1); border: 1px solid rgba(0,194,255,0.25);
  color: var(--sol3); font-family: var(--font-main); font-weight: 700;
  font-size: 0.85rem; transition: all .2s;
}
.btn-airdrop:hover { background: rgba(0,194,255,0.18); }
.btn-airdrop:disabled { opacity: .4; cursor: not-allowed; }

/* ── DISCONNECT ── */
.btn-disconnect {
  width: 100%; margin-top: 10px;
  padding: 10px; border-radius: 10px; border: none; cursor: pointer;
  background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.25);
  color: #ff4d6d; font-family: var(--font-main); font-weight: 700;
  font-size: 0.85rem; transition: all .2s;
}
.btn-disconnect:hover { background: rgba(255,77,109,0.2); }

/* ── TX LOG ── */
.tx-section { margin-top: 20px; }
.tx-title { font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); font-family: var(--font-mono); margin-bottom: 8px; }
.tx-log {
  background: rgba(0,0,0,.3); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px;
  max-height: 130px; overflow-y: auto;
  font-family: var(--font-mono); font-size: 0.68rem;
}
.tx-item { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,.04); color: var(--muted); }
.tx-item:last-child { border: none; }
.tx-item a { color: var(--sol3); text-decoration: none; }
.tx-item a:hover { text-decoration: underline; }
.tx-ok { color: #14F195; }
.tx-err { color: #ff4d6d; }

/* ── STATUS ── */
.status {
  text-align: center; margin-top: 16px;
  font-size: 0.72rem; font-family: var(--font-mono);
  color: var(--muted); min-height: 20px;
}
.status.ok  { color: var(--sol2); }
.status.err { color: #ff4d6d; }

/* ── PHANTOM NOTICE ── */
.phantom-notice {
  margin-top: 20px; padding: 12px;
  background: rgba(153,69,255,0.07); border: 1px solid var(--border);
  border-radius: 10px; font-size: 0.7rem; font-family: var(--font-mono);
  color: var(--muted); text-align: center; line-height: 1.5;
}
.phantom-notice a { color: var(--sol); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* spinner */
.spin {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <!-- LOGO -->
  <div class="logo-area">
    <span class="rocket">🚀</span>
    <div class="logo">BitcoinDobmoney</div>
    <div class="sub">Powered by Solana · Phantom Wallet</div>
  </div>

  <!-- NETWORK -->
  <div class="net-badge">
    <div class="dot"></div>
    <span id="net-label">Devnet · Lista para conectar</span>
  </div>

  <!-- CONNECT BUTTON -->
  <button class="btn-connect" id="btn-main" onclick="handleConnect()">
    <span>🟣</span> <span id="btn-text">CONECTAR PHANTOM</span>
  </button>

  <!-- WALLET INFO (shown after connect) -->
  <div class="wallet-box" id="wallet-box">
    <div class="wlabel">Dirección de tu cuenta</div>
    <div class="waddr">
      <span id="addr-text">—</span>
      <button class="copy-btn" onclick="copyAddr()" title="Copiar">📋</button>
    </div>

    <div class="wlabel">Saldo disponible</div>
    <div class="bal-row">
      <div class="bal-num" id="bal-num">0.000</div>
      <div class="bal-unit">◎ SOL</div>
    </div>
    <div class="bal-usd" id="bal-usd">≈ $0.00 USD</div>

    <button class="btn-airdrop" id="btn-airdrop" onclick="airdrop()">
      🪂 Solicitar 1 SOL gratis (Devnet)
    </button>

    <div class="tx-section">
      <div class="tx-title">Transacciones</div>
      <div class="tx-log" id="tx-log">
        <div class="tx-item" style="color:var(--muted)">Sin transacciones aún...</div>
      </div>
    </div>

    <button class="btn-disconnect" onclick="disconnect()">🔌 Desconectar Wallet</button>
  </div>

  <div class="status" id="status-msg"></div>

  <!-- PHANTOM NOTICE -->
  <div class="phantom-notice" id="phantom-notice">
    💡 En móvil, abre esta página desde el <strong>browser interno de Phantom</strong><br>
    o instala <a href="https://phantom.app/" target="_blank">phantom.app</a> en desktop
  </div>
</div>

<script>
const DEVNET = 'https://api.devnet.solana.com';
const EXPLORER = 'https://explorer.solana.com/tx/';
let pubkey = null;
let solPrice = 0;

// ── STATUS HELPER ──────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status ' + type;
}

// ── FETCH SOL PRICE ────────────────────────────────────
async function fetchSolPrice() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd');
    const d = await r.json();
    solPrice = d?.solana?.usd || 0;
  } catch { solPrice = 0; }
}

// ── FETCH BALANCE ──────────────────────────────────────
async function fetchBalance() {
  if (!pubkey) return;
  try {
    const r = await fetch(DEVNET, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0', id: 1,
        method: 'getBalance',
        params: [pubkey]
      })
    });
    const d = await r.json();
    const sol = (d?.result?.value || 0) / 1e9;
    document.getElementById('bal-num').textContent = sol.toFixed(4);
    if (solPrice > 0) {
      document.getElementById('bal-usd').textContent =
        '≈ $' + (sol * solPrice).toFixed(2) + ' USD';
    }
    return sol;
  } catch(e) {
    console.warn('Balance fetch error:', e);
    return 0;
  }
}

// ── CONNECT ────────────────────────────────────────────
async function handleConnect() {
  const phantom = window.solana;

  if (!phantom?.isPhantom) {
    setStatus('❌ Phantom no encontrada. Ábrela desde el browser de Phantom o instálala.', 'err');
    document.getElementById('phantom-notice').style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn-main');
  const btnText = document.getElementById('btn-text');
  btnText.innerHTML = '<span class="spin"></span> Conectando...';
  btn.disabled = true;
  setStatus('Esperando aprobación en Phantom...', '');

  try {
    const resp = await phantom.connect();
    pubkey = resp.publicKey.toString();

    // Update UI
    btn.classList.add('connected');
    btnText.textContent = '✅ CONECTADO';
    btn.disabled = false;
    btn.onclick = null; // disable reconnect

    document.getElementById('addr-text').textContent = pubkey;
    document.getElementById('wallet-box').classList.add('show');
    document.getElementById('phantom-notice').style.display = 'none';
    document.getElementById('net-label').textContent = 'Devnet · Wallet Conectada ✅';

    setStatus('✅ Billetera conectada correctamente', 'ok');

    await fetchSolPrice();
    await fetchBalance();

    // Auto-refresh balance every 15s
    setInterval(fetchBalance, 15000);

  } catch(e) {
    btn.disabled = false;
    btnText.textContent = 'CONECTAR PHANTOM';
    if (e.code === 4001) {
      setStatus('⚠️ Conexión rechazada por el usuario', 'err');
    } else {
      setStatus('❌ Error: ' + e.message, 'err');
    }
  }
}

// ── DISCONNECT ─────────────────────────────────────────
async function disconnect() {
  try {
    await window.solana?.disconnect();
  } catch {}
  pubkey = null;

  const btn = document.getElementById('btn-main');
  const btnText = document.getElementById('btn-text');
  btn.classList.remove('connected');
  btnText.textContent = 'CONECTAR PHANTOM';
  btn.onclick = handleConnect;
  btn.disabled = false;

  document.getElementById('wallet-box').classList.remove('show');
  document.getElementById('bal-num').textContent = '0.000';
  document.getElementById('bal-usd').textContent = '≈ $0.00 USD';
  document.getElementById('addr-text').textContent = '—';
  document.getElementById('net-label').textContent = 'Devnet · Lista para conectar';
  document.getElementById('phantom-notice').style.display = 'block';
  setStatus('🔌 Wallet desconectada', '');
}

// ── AIRDROP ────────────────────────────────────────────
async function airdrop() {
  if (!pubkey) return;
  const btn = document.getElementById('btn-airdrop');
  btn.disabled = true;
  btn.textContent = '⏳ Solicitando airdrop...';
  setStatus('Solicitando 1 SOL de Devnet...', '');

  try {
    const r = await fetch(DEVNET, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0', id: 1,
        method: 'requestAirdrop',
        params: [pubkey, 1000000000]
      })
    });
    const d = await r.json();
    if (d.result) {
      addTx('🪂 AIRDROP 1 SOL', d.result, true);
      setStatus('✅ 1 SOL recibido en Devnet!', 'ok');
      setTimeout(fetchBalance, 2500);
    } else {
      setStatus('❌ Airdrop falló: ' + JSON.stringify(d.error?.message || d.error), 'err');
    }
  } catch(e) {
    setStatus('❌ Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '🪂 Solicitar 1 SOL gratis (Devnet)';
  }
}

// ── TX LOG ─────────────────────────────────────────────
function addTx(label, sig, ok) {
  const log = document.getElementById('tx-log');
  // Remove placeholder
  if (log.children.length === 1 && log.children[0].textContent.includes('Sin transacciones')) {
    log.innerHTML = '';
  }
  const item = document.createElement('div');
  item.className = 'tx-item';
  if (ok && sig && sig.length > 20) {
    item.innerHTML = `<span class="tx-ok">✅</span> ${label} — <a href="${EXPLORER}${sig}?cluster=devnet" target="_blank">${sig.slice(0,10)}...</a>`;
  } else {
    item.innerHTML = `<span class="tx-err">❌</span> ${label}`;
  }
  log.prepend(item);
}

// ── COPY ADDRESS ───────────────────────────────────────
function copyAddr() {
  if (!pubkey) return;
  navigator.clipboard.writeText(pubkey).then(() => {
    setStatus('📋 Dirección copiada', 'ok');
    setTimeout(() => setStatus('', ''), 2000);
  });
}

// ── AUTO-CONNECT if already authorized ────────────────
window.addEventListener('load', async () => {
  if (window.solana?.isPhantom) {
    try {
      const resp = await window.solana.connect({ onlyIfTrusted: true });
      if (resp.publicKey) {
        pubkey = resp.publicKey.toString();
        document.getElementById('btn-main').click();
      }
    } catch {} // not previously authorized, that's fine
  }
});
</script>
</body>
</html>
