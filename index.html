<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Definitiva - Solana</title>
    <!-- LIBRERÍA DIRECTA Y LIMPIA -->
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/dist/index.iife.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0a0a12;
            color: white;
            padding: 50px 20px;
            text-align: center;
        }
        h1 { color: #9945FF; margin-bottom: 40px; }
        #boton {
            background: linear-gradient(90deg, #5C27FE, #9945FF);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        #boton:hover { transform: scale(1.05); }
        #estado {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background: #13131F;
            display: inline-block;
            min-width: 300px;
        }
        .ok { color: #28C76F; }
        .error { color: #FF4D4F; }
    </style>
</head>
<body>

    <h1>🚀 CONEXIÓN SOLANA - VERSIÓN LIMPIA</h1>

    <!-- EL BOTÓN QUE SÍ FUNCIONA -->
    <button id="boton">🔗 CONECTAR PHANTOM</button>

    <div id="estado">Esperando acción...</div>

    <script>
        // 🔌 CONEXIÓN DIRECTA A LA RED PRINCIPAL
        const conexion = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

        // ELEMENTOS
        const boton = document.getElementById('boton');
        const estado = document.getElementById('estado');
        let wallet;

        // ⚡ AL CARGAR LA PÁGINA
        window.onload = () => {
            // DETECTAR PHANTOM
            if (window.phantom?.solana) {
                estado.textContent = "✅ Phantom DETECTADO. Haz clic en el botón.";
                estado.className = "ok";
                wallet = window.phantom.solana;
            } else {
                estado.textContent = "❌ Phantom NO INSTALADO. Descárgalo en phantom.app";
                estado.className = "error";
                boton.textContent = "⬇️ INSTALAR PHANTOM";
                boton.onclick = () => window.open('https://phantom.app/download','_blank');
            }
        };

        // 🎯 FUNCIÓN DEL BOTÓN
        boton.onclick = async () => {
            if (!wallet) return;

            try {
                // 👇 AQUÍ ES DONDE SE ABRE LA VENTANA
                const respuesta = await wallet.connect();
                const direccion = respuesta.publicKey.toString();

                // SI LLEGA AQUÍ, ES QUE FUNCIONÓ
                estado.innerHTML = `
                    ✅ <b>CONECTADO!</b><br>
                    Dirección: ${direccion}<br>
                    <small>(Leyendo saldo...)</small>
                `;
                estado.className = "ok";
                boton.textContent = "🔌 DESCONECTAR";

                // LEER SALDO DE VERDAD
                const saldo = await conexion.getBalance(respuesta.publicKey);
                const saldoSOL = (saldo / solanaWeb3.LAMPORTS_PER_SOL).toFixed(4);
                
                estado.innerHTML = `
                    ✅ <b>CONECTADO CORRECTAMENTE</b><br>
                    Dirección: <small>${direccion}</small><br>
                    💰 Saldo: <b>${saldoSOL} SOL</b>
                `;

                // FUNCIÓN PARA DESCONECTAR
                boton.onclick = async () => {
                    await wallet.disconnect();
                    estado.textContent = "🔌 Desconectado. Listo para volver a conectar.";
                    estado.className = "";
                    boton.textContent = "🔗 CONECTAR PHANTOM";
                    boton.onclick = arguments.callee;
                };

            } catch (e) {
                estado.textContent = "❌ ERROR: " + e.message;
                estado.className = "error";
            }
        };
    </script>

</body>
</html>
