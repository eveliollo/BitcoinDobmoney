<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitcoinDok • Solana</title>
    <!-- LIBRERÍAS OFICIALES Y AUTORIZADAS POR SOLANA -->
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.3.8/lib/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --fondo-principal: #000000;
            --fondo-tarjeta: #0A0A12;
            --color-borde: #2D2D44;
            --color-morado: #9945FF;
            --color-verde: #14F195;
            --color-naranja: #FF9500;
            --color-amarillo: #E6E200;
            --color-texto: #FFFFFF;
            --color-texto-suave: #8A8A9E;
            --color-enlace: #FF9500;
            --color-rojo: #FF4D6D;
            --color-azul: #00C2FF;
            --color-oscuro: #12121F;
            --color-dorado: #FFD700;
            --color-blanco-luz: #FFFFFF;
        }

        body {
            background-color: var(--fondo-principal);
            color: var(--color-texto);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            background-image: 
                linear-gradient(rgba(153, 69, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(153, 69, 255, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 420px;
            background-color: var(--fondo-tarjeta);
            border: 2px solid var(--color-borde);
            border-radius: 28px;
            padding: 40px 28px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .contenedor-principal::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(153, 69, 255, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ==============================================
           NUEVO LOGO BONITO Y MODERNO
           ============================================== */
           
        .contenedor-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--color-morado), var(--color-azul));
            padding: 8px;
            margin-bottom: 18px;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 30px rgba(153, 69, 255, 0.4), inset 0 0 15px rgba(255,255,255,0.2);
            animation: latido 2.5s ease-in-out infinite;
        }

        .contenedor-logo::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 33px;
            background: linear-gradient(45deg, var(--color-naranja), var(--color-dorado), var(--color-verde));
            z-index: -1;
            filter: blur(5px);
            opacity: 0.8;
        }

        .icono-logo {
            font-size: 52px;
            animation: movimiento 3s ease-in-out infinite;
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes movimiento {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(-3deg); }
            75% { transform: translateY(5px) rotate(3deg); }
        }

        /* NOMBRE SE MANTIENE IGUAL */
        .nombre-logo {
            font-size: 46px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(
                45deg, 
                var(--color-naranja) 0%, 
                var(--color-dorado) 25%, 
                var(--color-amarillo) 50%, 
                var(--color-verde) 75%, 
                var(--color-azul) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
        }

        .subtitulo {
            font-size: 17px;
            color: var(--color-texto-suave);
            margin-bottom: 35px;
            line-height: 1.6;
            position: relative;
            z-index: 2;
            font-weight: 500;
        }

        /* ==============================================
           ELEMENTOS DE LA INTERFAZ IGUAL QUE TU IMAGEN
           ============================================== */

        .etiqueta-red {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--color-oscuro);
            border: 1px solid var(--color-verde);
            border-radius: 25px;
            padding: 12px 24px;
            font-size: 20px;
            color: var(--color-verde);
            font-weight: 600;
            margin-bottom: 35px;
            position: relative;
            z-index: 2;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .etiqueta-red.cambiando {
            border-color: var(--color-azul);
            color: var(--color-azul);
            transform: scale(1.05);
        }

        .punto-verde {
            width: 12px;
            height: 12px;
            background-color: var(--color-verde);
            border-radius: 50%;
            animation: parpadeo 1.5s ease-in-out infinite;
            box-shadow: 0 0 10px var(--color-verde);
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .icono-check {
            color: var(--color-verde);
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 0 8px var(--color-verde);
        }

        .boton-conectar {
            width: 100%;
            background: linear-gradient(135deg, var(--color-morado), #8B5CF6);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 24px;
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(153, 69, 255, 0.4), 0 0 50px rgba(153, 69, 255, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        .boton-conectar.conectado {
            background: linear-gradient(135deg, #0a8f5a, var(--color-verde));
            box-shadow: 0 0 30px rgba(20, 241, 149, 0.3), 0 0 50px rgba(20, 241, 149, 0.2);
        }

        .boton-conectar:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(153, 69, 255, 0.6), 0 0 60px rgba(153, 69, 255, 0.3);
        }

        .circulo-boton {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background-color: var(--color-morado);
            border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .boton-conectar.conectado .circulo-boton {
            background-color: var(--color-verde);
            box-shadow: 0 0 15px rgba(20, 241, 149, 0.8);
        }

        .aviso-phantom {
            background-color: var(--color-oscuro);
            border: 1px solid var(--color-borde);
            border-radius: 15px;
            padding: 22px;
            text-align: center;
            font-size: 16px;
            color: var(--color-texto-suave);
            line-height: 1.7;
            position: relative;
            z-index: 2;
        }

        .enlace {
            color: var(--color-enlace);
            text-decoration: none;
            font-weight: bold;
        }

        .enlace:hover {
            text-decoration: underline;
        }

        /* ==============================================
           FUNCIONES REALES DE SOLANA AGREGADAS
           ============================================== */

        /* Notificaciones */
        .notificacion {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--color-oscuro);
            border: 1px solid var(--color-verde);
            color: var(--color-verde);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 9999;
            display: none;
            animation: entrada 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .notificacion.error { border-color: var(--color-rojo); color: var(--color-rojo); }
        .notificacion.azul { border-color: var(--color-azul); color: var(--color-azul); }
        .notificacion.naranja { border-color: var(--color-naranja); color: var(--color-naranja); }

        @keyframes entrada {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Navegación entre secciones */
        .navegacion {
            display: flex;
            gap: 8px;
            margin: 20px 0;
            overflow-x: auto;
            padding-bottom: 5px;
            display: none;
        }

        .btn-navegacion {
            flex: 0 0 auto;
            padding: 10px 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            background-color: var(--color-oscuro);
            color: var(--color-texto-suave);
            border: 1px solid transparent;
        }

        .btn-navegacion.activo {
            background: linear-gradient(135deg, var(--color-morado), #7b2fff);
            color: white;
            border-color: var(--color-morado);
        }

        /* Secciones de contenido */
        .seccion {
            display: none;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
            animation: aparecer 0.4s ease;
        }

        .seccion.mostrar {
            display: block;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tarjetas de información */
        .tarjeta {
            background-color: var(--color-oscuro);
            border: 1px solid var(--color-borde);
            border-radius: 15px;
