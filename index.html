        :root {
            --fondo-principal: #000000;
            --fondo-tarjeta: #0A0A12;
            --color-borde: #2D2D44;
            --color-morado: #9945FF;

        body {
            background-color: var(--fondo-principal);
            color: var(--color-texto);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            background-image:

                linear-gradient(90deg, rgba(153, 69, 255, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 420px;
            background-color: var(--fondo-tarjeta);
            border: 2px solid var(--color-borde);
            border-radius: 28px;
            padding: 40px 28px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .contenedor-principal::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(153, 69, 255, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* LOGO Y NOMBRE EXACTO COMO TU IMAGEN */
        .icono-cohete {
            font-size: 55px;
            display: block;
            margin-bottom: 15px;
            animation: flotar 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
