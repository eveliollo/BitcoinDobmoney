<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitcoinDobmor • P2P Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        :root {
            --bg-principal: #050510;
            --bg-tarjeta: #0d0d22;
            --borde: rgba(153, 69, 255, 0.3);
            --borde-verde: rgba(20, 241, 149, 0.25);
            --texto: #e8e8ff;
            --texto-suave: #7070a0;
            --sol-morado: #9945FF;
            --sol-verde: #14F195;
            --sol-azul: #00C2FF;
            --rojo: #ff4d6d;
            --gris-oscuro: #1a1a2e;
        }

        body {
            background: var(--bg-principal);
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(153,69,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(153,69,255,0.04) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
            z-index: 0;
        }

        .contenedor {
            width: 100%;
            max-width: 480px;
            background: rgba(13, 13, 34, 0.85);
            border: 1px solid var(--borde);
            border-radius: 28px;
            padding: 36px 28px;
            backdrop-filter: blur(24px);
            box-shadow: 0 0 60px rgba(153, 69, 255, 0.1);
            position: relative;
            z-index: 2;
        }

        /* LOGO */
        .seccion-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .icono-cohete {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 12px;
            animation: flotar 3s ease-in-out infinite;
        }
        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .nombre-logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--sol-morado), var(--sol-azul), var(--sol-verde));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .sub-logo {
            font-size: 0.85rem;
            color: var(--texto-suave);
            letter-spacing: 0.5px;
        }

        /* ESTADO DE RED */
        .etiqueta-red {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(20, 241, 149, 0.08);
            border: 1px solid var(--borde-verde);
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 0.85rem;
            color: var(--sol-verde);
            margin-bottom: 24px;
            width: 100%;
        }
        .punto-activo {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--sol-verde);
            animation: parpadeo 1.5s ease infinite;
        }
        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* BOTON CONECTAR */
        .boton-conectar {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--sol-morado), #7b2fff);
            color: white;
            box-shadow: 0 4px 24px rgba(153, 69, 255, 0.45);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .boton-conectar.conectado {
            background: linear-gradient(135deg, #0a8f5a, var(--sol-verde));
            box-shadow: 0 4px 24px rgba(20, 241, 149, 0.35);
        }
        .circulo-boton {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--sol-morado);
            border: 2px solid white;
        }
        .boton-conectar.conectado .circulo-boton { background: var(--sol-verde); }

        /* INFO BILLETERA */
        .info-billetera {
            display: none;
            background: rgba(20, 241, 149, 0.05);
            border: 1px solid var(--borde-verde);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
            animation: aparecer 0.4s ease;
        }
        .info-billetera.mostrar { display: block; }
        @keyframes aparecer { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .etiqueta-dato { font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--texto-suave); margin-bottom: 8px; font-weight: 600; }
        .direccion-campo { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; margin-bottom: 20px; }
        .direccion-texto { font-family: monospace; font-size: 0.8rem; color: var(--sol-azul); word-break: break-all; }
        .boton-copiar { background: none; border: none; color: var(--texto-suave); font-size: 1.2rem; cursor: pointer; }
        .boton-copiar:hover { color: var(--sol-verde); }
        .saldo-numero { font-size: 2rem; font-weight: 800; background: linear-gradient(90deg, var(--sol-verde), var(--sol-azul)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* SECCION P2P */
        .seccion-p2p { background: rgba(0,0,0,0.2); border: 1px solid var(--borde); border-radius: 14px; padding: 20px; margin-bottom: 20px; display: none; }
        .seccion-p2p.mostrar { display: block; }
        .titulo-p2p { text-align: center; margin-bottom: 15px; color: var(--sol-verde); }
        .input-codigo { width: 100%; padding: 12px; background: var(--gris-oscuro); border: 1px solid var(--borde); border-radius: 8px; color: white; margin-bottom: 10px; font-size: 0.9rem; }
        .fila-botones { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-p2p { flex:1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-crear { background: var(--sol-morado); color: white; }
        .btn-unir { background: var(--sol-azul); color: white; }
        .btn-p2p:hover { transform: translateY(-2px); }

        /* VIDEOS */
        .contenedor-videos { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .contenedor-videos.activo { display: grid; }
        .video-box { background: black; border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; border: 2px solid var(--sol-verde); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-titulo { font-size: 0.7rem; text-align: center; margin-top: 4px; color: var(--texto-suave); }

        /* CHAT */
        .contenedor-chat { display: none; margin-top: 15px; }
        .contenedor-chat.activo { display: block; }
        .caja-mensajes { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.4); border: 1px solid var(--borde); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 0.85rem; }
        .mensaje { margin-bottom: 6px; padding: 4px 8px; border-radius: 6px; max-width: 80%; }
        .mensaje-propio { background: var(--sol-morado); margin-left: auto; text-align: right; }
        .mensaje-otro {
