<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitcoinDobmoney P2P</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>

<body>

<div class="app">

<header class="topbar">
    <h1>⚡ BitcoinDobmoney P2P</h1>
    <button id="walletBtn">👻 Conectar Phantom</button>
</header>

<section class="hero">
    <h2>P2P + Cámara + Solana</h2>
    <p>Negociación segura con verificación visual.</p>
</section>

<section class="wallet-card">
    <h3>Wallet</h3>
    <p id="walletAddress">No conectado</p>
    <p id="walletBalance">Balance: --</p>
</section>

<section class="camera-card">

    <div class="cam-header">
        <h3>🎥 Cámara P2P</h3>
        <button id="cameraBtn">Activar Cámara</button>
    </div>

    <video
        id="video"
        autoplay
        playsinline
        muted>
    </video>

</section>

<section class="chat-card">

    <h3>💬 Negociación</h3>

    <div id="chatBox"></div>

    <div class="chat-input">
        <input id="msgInput" placeholder="Escribe mensaje...">
        <button id="sendBtn">Enviar</button>
    </div>

</section>

<section class="network-card">
    <h3>🌐 Solana Mainnet</h3>
    <p id="networkStatus">Verificando...</p>
</section>

</div>

<script src="app.js"></script>

</body>
</html>
