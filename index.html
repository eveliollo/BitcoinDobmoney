<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitcoinDobmoney • Solana</title>

    <script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.3.8/lib/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://unpkg.com/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --fondo-principal: #000000;
            --fondo-tarjeta: #0A0A12;
            --borde-color: #2D2D44;
            --color-morado: #9945FF;
            --color-verde: #14F195;
            --color-naranja: #FF9500;
            --color-amarillo: #E6E200;
            --color-texto: #FFFFFF;
            --color-texto-suave: #8A8A9E;
            --color-enlace: #FF9500;
            --color-rojo: #FF4D6D;
            --color-azul: #00C2FF;
            --color-gris: #1E1E30;
            --color-negro-suave: #07070F;
        }

        body {
            background-color: var(--fondo-principal);
            color: var(--color-texto);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            background-image: 
                linear-gradient(rgba(153, 69, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(153, 69, 255, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 420px;
            background-color: var(--fondo-tarjeta);
            border: 2px solid var(--borde-color);
            border-radius: 28px;
            padding: 40px 28px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .contenedor-principal::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(153, 69, 255, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* LOGO Y NOMBRE */
        .icono-cohete {
            font-size: 55px;
            display: block;
            margin-bottom: 15px;
            animation: flotar 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .nombre-logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--color-naranja), var(--color-amarillo), var(--color-verde));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .subtitulo {
            font-size: 16px;
            color: var(--color-texto-suave);
            margin-bottom: 30px;
            line-height: 1.5;
            position: relative;
            z-index: 2;
        }

        /* ETIQUETA DE RED */
        .etiqueta-red {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #0F172A;
            border: 1px solid var(--color-verde);
            border-radius: 25px;
            padding: 10px 20px;
            font-size: 18px;
            color: var(--color-verde);
            font-weight: 600;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .etiqueta-red.cambiando {
            border-color: var(--color-azul);
            color: var(--color-azul);
            transform: scale(1.05);
        }

        .punto-verde {
            width: 12px;
            height: 12px;
            background-color: var(--color-verde);
            border-radius: 50%;
            animation: parpadeo 1.5s ease-in-out infinite;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .icono-check {
            color: var(--color-verde);
            font-weight: bold;
            font-size: 20px;
        }

        /* NOTIFICACIONES */
        .notificacion {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--color-gris);
            border: 1px solid var(--color-verde);
            color: var(--color-verde);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 9999;
            display: none;
            animation: entrada 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .notificacion.error { border-color: var(--color-rojo); color: var(--color-rojo); }
        .notificacion.azul { border-color: var(--color-azul); color: var(--color-azul); }
        .notificacion.naranja { border-color: var(--color-naranja); color: var(--color-naranja); }

        @keyframes entrada {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* BOTON CONECTAR */
        .boton-conectar {
            width: 100%;
            background: linear-gradient(135deg, var(--color-morado), #7b2fff);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 22px;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(153, 69, 255, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }

        .boton-conectar.conectado {
            background: linear-gradient(135deg, #0a8f5a, var(--color-verde));
            box-shadow: 0 0 30px rgba(20, 241, 149, 0.3);
        }

        .boton-conectar:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(153, 69, 255, 0.6);
        }

        .circulo-boton {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--color-morado);
            border: 2px solid white;
        }

        .boton-conectar.conectado .circulo-boton {
            background-color: var(--color-verde);
        }

        /* NAVEGACIÓN */
        .navegacion {
            display: flex;
            gap: 8px;
            margin: 20px 0;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .btn-navegacion {
            flex: 0 0 auto;
            padding: 10px 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            background-color: var(--color-gris);
            color: var(--color-texto-suave);
            border: 1px solid transparent;
        }

        .btn-navegacion.activo {
            background: linear-gradient(135deg, var(--color-morado), #7b2fff);
            color: white;
            border-color: var(--color-morado);
        }

        /* SECCIONES GENERALES */
        .seccion {
            display: none;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
            animation: aparecer 0.4s ease;
        }

        .seccion.mostrar {
            display: block;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TARJETAS Y CONTENEDORES */
        .tarjeta {
            background-color: #0F172A;
            border: 1px solid var(--borde-color);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .tarjeta.t-verde { border-color: var(--color-verde); }
        .tarjeta.t-morado { border-color: var(--color-morado); }
        .tarjeta.t-azul { border-color: var(--color-azul); }
        .tarjeta.t-naranja { border-color: var(--color-naranja); }

        .titulo-tarjeta {
            font-size: 16px;
            color: var(--color-texto-suave);
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .titulo-tarjeta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* DATOS DE BILLETERA */
        .fila-dato {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--borde-color);
        }

        .fila-dato:last-child { border-bottom: none; }

        .etiqueta {
            color: var(--color-texto-suave);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .valor {
            color: var(--color-texto);
            font-weight: bold;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .valor.verde { color: var(--color-verde); }
        .valor.rojo { color: var(--color-rojo); }
        .valor.azul { color: var(--color-azul); }
        .valor.naranja { color: var(--color-naranja); }

        .btn-icono {
            background: none;
            border: none;
            color: var(--color-texto-suave);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.2s;
        }

        .btn-icono:hover { color: var(--color-verde); }

        /* PRECIOS Y GRÁFICOS */
        .precio-actual {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .precio-numero {
            font-size: 28px;
            font-weight: bold;
            color: var(--color-verde);
        }

        .variacion {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .variacion.verde { background-color: rgba(20, 241, 149, 0.15); color: var(--color-verde); }
        .variacion.rojo { background-color: rgba(255, 77, 109, 0.15); color: var(--color-rojo); }

        .grafico-contenedor {
            height: 180px;
            width: 100%;
        }

        /* FORMULARIOS DE ENVÍO/RECIBO */
        .grupo-input {
            margin-bottom: 15px;
            text-align: left;
        }

        .etiqueta-input {
            display: block;
            font-size: 13px;
            color: var(--color-texto-suave);
            margin-bottom: 6px;
        }

        .input-estilo {
            width: 100%;
            padding: 12px 14px;
            background-color: var(--color-gris);
            border: 1px solid var(--borde-color);
            border-radius: 10px;
            color: white;
            font-size: 15px;
        }

        .input-estilo:focus {
            outline: none;
            border-color: var(--color-morado);
            box-shadow: 0 0 0 2px rgba(153, 69, 255, 0.1);
        }

        .info-comision {
            font-size: 12px;
            color: var(--color-naranja);
            margin-top: 5px;
            text-align: right;
        }

        .btn-principal {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--color-verde), #00cc88);
            color: black;
            border: none;
