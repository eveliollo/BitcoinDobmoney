<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitcoin Dob Money | Solana DApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
:root {
  --sol: #FF9500;
  --sol2: #00FFA3;
  --sol3: #14F195;
  --bg: #000000;
  --bg2: #0A0A0F;
  --border: #1E1E2F;
  --text: #FFFFFF;
  --muted: #888899;
  --font-mono: 'Space Mono', monospace;
  --font-main: 'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(153,69,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(153,69,255,0.04) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none;
}

/* ── CARD ── */
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: rgba(10,10,15,0.9);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 28px;
  box-shadow: 0 0 60px rgba(0,0,0,0.5);
}

/* ── LOGO ── */
.logo-area { text-align: center; margin-bottom: 32px; }

.rocket { font-size: 3rem; display: block; margin-bottom: 12px; }

.logo { 
  font-size: 2.2rem; 
  font-weight: 800; 
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--sol), var(--sol2));
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent;
}

.sub { 
  font-size: 0.9rem; 
  color: var(--muted); 
  font-family: var(--font-mono);
  margin-top: 8px; 
  letter-spacing: 0.5px; 
}

/* ── NETWORK BADGE ── */
.net-badge {
  display: inline-flex; 
  align-items: center; 
  gap: 8px;
  background: #0F172A;
  border: 1px solid #1E293B;
  border-radius: 20px; 
  padding: 8px 18px;
  font-size: 0.9rem; 
  font-family: var(--font-mono);
  color: var(--sol2); 
  margin-bottom: 30px;
  width: 100%; 
  justify-content: center;
}
.dot { 
  width: 8px; 
  height: 8px; 
  border-radius: 50%;
  background: var(--sol2); 
  animation: pulse 1.5s ease infinite; 
}
@keyframes pulse { 
  0%,100%{opacity:1} 
  50%{opacity:.3} 
}

/* ── CONNECT BUTTON ── */
.btn-connect {
  width: 100%;
  padding: 20px;
  border-radius: 16px; 
  border: none; 
  cursor: pointer;
  font-family: var(--font-main); 
  font-weight: 800; 
  font-size: 1.3rem;
  letter-spacing: .5px;
  background: linear-gradient(135deg, #9945FF, #7b2fff);
  color: #fff;
  box-shadow: 0 4px 24px rgba(153,69,255,0.45);
  transition: all .25s;
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 12px;
  text-transform: uppercase;
}
.btn-connect:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(153,69,255,0.6);
}
.btn-connect:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-connect.connected {
  background: linear-gradient(135deg, #0a8f5a, #14F195);
  box-shadow: 0 4px 24px rgba(20,241,149,0.35);
}

/* ── STATUS ── */
.status {
  text-align: center; 
  margin-top: 20px;
  font-size: 0.85rem; 
  font-family: var(--font-mono);
  color: var(--muted); 
  min-height: 25px;
}
.status.ok  { color: var(--sol2); }
.status.err { color: #ff4d6d; }

/* ── PHANTOM NOTICE ── */
.phantom-notice {
  margin-top: 25px; 
  padding: 15px;
  background: #0F172A; 
  border: 1px solid #1E293B;
  border-radius: 12px; 
  font-size: 0.8rem; 
  font-family: var(--font-mono);
  color: var(--muted); 
  text-align: center; 
  line-height: 1.6;
}
.phantom-notice a { color: var(--sol); text-decoration: none; }
.phantom-notice a:hover { text-decoration: underline; }

/* spinner */
.spin {
  display: inline-block; 
  width: 16px; 
  height: 16px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: #fff; 
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <!-- LOGO -->
  <div class="logo-area">
    <span class="rocket">🚀</span>
    <div class="logo">BitcoinDobmoney</div>
    <div class="sub">Powered by Solana · Phantom Wallet</div>
  </div>

  <!-- NETWORK -->
  <div class="net-badge">
    <div class="dot"></div>
    <span id="net-label">MAINNET · Red Real ✅</span>
  </div>

  <!-- CONNECT BUTTON -->
  <button class="btn-connect" id="btn-main" onclick="handleConnect()">
    <span>🟣</span> <span id="btn-text">CONECTAR PHANTOM</span>
  </button>

  <div class="status" id="status-msg"></div>

  <!-- PHANTOM NOTICE -->
  <div class="phantom-notice" id="phantom-notice">
    💡 En móvil, abre esta página desde el <strong>browser interno de Phantom</strong><br>
    o instala <a href="https://phantom.app/" target="_blank">phantom.app</a> en desktop
  </div>
</div>

<script>
const MAINNET = 'https://api.mainnet-beta.solana.com';
let pubkey = null;
let solPrice = 0;

// ── STATUS HELPER ──────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status ' + type;
}

// ── CONNECT ────────────────────────────────────────────
async function handleConnect() {
  const phantom = window.solana;

  if (!phantom?.isPhantom) {
    setStatus('❌ Phantom no encontrada. Ábrela desde el browser de Phantom o instálala.', 'err');
    document.getElementById('phantom-notice').style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn-main');
  const btnText = document.getElementById('btn-text');
  btnText.innerHTML = '<span class="spin"></span> Conectando...';
  btn.disabled = true;
  setStatus('Esperando aprobación en Phantom...', '');

  try {
    const resp = await phantom.connect();
    pubkey = resp.publicKey.toString();

    btn.classList.add('connected');
    btnText.textContent = '✅ CONECTADO';
    btn.disabled = false;
    btn.onclick = null;

    document.getElementById('net-label').textContent = 'MAINNET · Conectada ✅';
    setStatus('✅ Billetera conectada correctamente', 'ok');

  } catch(e) {
    btn.disabled = false;
    btnText.textContent = 'CONECTAR PHANTOM';
    if (e.code === 4001) {
      setStatus('⚠️ Conexión rechazada por el usuario', 'err');
    } else {
      setStatus('❌ Error: ' + e.message, 'err');
    }
  }
}
</script>
</body>
</html>
